# Chunk Profile Configuration (YAML)
# Defines chunking strategies for different document types

profiles:
  faq:
    description: "FAQ-style Q&A documents (short, atomic answers)"
    chunk_size: 320
    overlap: 60
    separator_priority:
      - "\n\n"
      - "\n"
      - " "
    min_tokens: 80
    compression: "summary"
    preserve_metadata_fields:
      - "faq_type"
      - "audience"
      - "info_type"

  policy:
    description: "Legal/policy documents (hierarchical structure)"
    chunk_size: 420
    overlap: 100
    preserve_sections: true
    section_regex: "^(PHẦN|CHƯƠNG|MỤC|Điều|Khoản|Điểm)"
    separator_priority:
      - "\n\nĐiều "
      - "\n\nKhoản "
      - "\n\n"
      - "\n"
    min_tokens: 120
    compression: "full_text"
    preserve_metadata_fields:
      - "source"
      - "effective_date"
      - "unit"
      - "info_type"
      - "legal_structure_detected"

  auto:
    description: "Auto-detect based on metadata (default)"
    chunk_size: 350
    overlap: 70
    separator_priority:
      - "\n## "
      - "\n### "
      - "\n\n"
      - "\n"
      - ". "
      - " "
    min_tokens: 100
    compression: "adaptive"
