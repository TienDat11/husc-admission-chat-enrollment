<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">\n  <rect x="0" y="0" width="1400" height="900" fill="white"/>\n  <text x="700" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">Cosine Similarity Decay in Multi-hop Retrieval</text>\n  <rect x="100" y="598" width="1250" height="222" fill="#FFCDD2" opacity="0.5"/>\n  <g font-family="Arial, sans-serif" font-size="14" fill="#555">\n    <line x1="100" y1="80" x2="1350" y2="80" stroke="#ddd" stroke-width="1"/>\n    <text x="90" y="85" text-anchor="end">1.0</text>\n    <line x1="100" y1="228" x2="1350" y2="228" stroke="#ddd" stroke-width="1"/>\n    <text x="90" y="233" text-anchor="end">0.8</text>\n    <line x1="100" y1="376" x2="1350" y2="376" stroke="#ddd" stroke-width="1"/>\n    <text x="90" y="381" text-anchor="end">0.6</text>\n    <line x1="100" y1="524" x2="1350" y2="524" stroke="#ddd" stroke-width="1"/>\n    <text x="90" y="529" text-anchor="end">0.4</text>\n    <line x1="100" y1="672" x2="1350" y2="672" stroke="#ddd" stroke-width="1"/>\n    <text x="90" y="677" text-anchor="end">0.2</text>\n    <line x1="100" y1="820" x2="1350" y2="820" stroke="#555" stroke-width="2"/>\n    <text x="90" y="825" text-anchor="end">0.0</text>\n  </g>\n  <text x="50" y="450" text-anchor="middle" transform="rotate(-90, 50, 450)" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Cosine Similarity</text>\n  <g font-family="Arial, sans-serif" font-size="14" fill="#555">\n    <line x1="100" y1="820" x2="100" y2="828" stroke="#555" stroke-width="2"/>\n    <text x="100" y="845" text-anchor="middle">0</text>\n    <line x1="350" y1="820" x2="350" y2="828" stroke="#555" stroke-width="2"/>\n    <text x="350" y="845" text-anchor="middle">1</text>\n    <line x1="600" y1="820" x2="600" y2="828" stroke="#555" stroke-width="2"/>\n    <text x="600" y="845" text-anchor="middle">2</text>\n    <line x1="850" y1="820" x2="850" y2="828" stroke="#555" stroke-width="2"/>\n    <text x="850" y="845" text-anchor="middle">3</text>\n    <line x1="1100" y1="820" x2="1100" y2="828" stroke="#555" stroke-width="2"/>\n    <text x="1100" y="845" text-anchor="middle">4</text>\n    <line x1="1350" y1="820" x2="1350" y2="828" stroke="#555" stroke-width="2"/>\n    <text x="1350" y="845" text-anchor="middle">5</text>\n  </g>\n  <text x="725" y="875" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Number of hops (n)</text>\n  <line x1="100" y1="80" x2="100" y2="820" stroke="#555" stroke-width="2"/>\n  <polyline points="100,80 350,265 600,435.2 850,561 1100,657.2 1350,723.8" fill="none" stroke="#1565C0" stroke-width="3"/>\n  <g fill="#1565C0">\n    <circle cx="100" cy="80" r="7"/>\n    <circle cx="350" cy="265" r="7"/>\n    <circle cx="600" cy="435.2" r="7"/>\n    <circle cx="850" cy="561" r="7"/>\n    <circle cx="1100" cy="657.2" r="7"/>\n    <circle cx="1350" cy="723.8" r="7"/>\n  </g>\n  <g font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565C0">\n    <text x="100" y="65" text-anchor="middle">1.00</text>\n    <text x="350" y="250" text-anchor="middle">0.75</text>\n    <text x="600" y="420" text-anchor="middle">0.52</text>\n    <text x="850" y="546" text-anchor="middle">0.35</text>\n    <text x="1100" y="642" text-anchor="middle">0.22</text>\n    <text x="1350" y="708" text-anchor="middle">0.13</text>\n  </g>\n  <line x1="100" y1="598" x2="1350" y2="598" stroke="#d32f2f" stroke-width="2" stroke-dasharray="10,5"/>\n  <text x="1360" y="603" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d32f2f">Retrieval threshold</text>\n  <text x="725" y="710" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#d32f2f" opacity="0.7">Retrieval failure zone</text>\n  <defs>\n    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">\n      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>\n    </marker>\n  </defs>\n  <line x1="950" y1="500" x2="870" y2="545" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>\n  <text x="955" y="495" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Multi-hop queries fail here</text>\n  <g transform="translate(1020, 90)">\n    <rect x="0" y="0" width="280" height="35" fill="white" stroke="#ccc" stroke-width="1" rx="3"/>\n    <line x1="15" y1="17.5" x2="45" y2="17.5" stroke="#1565C0" stroke-width="3"/>\n    <circle cx="30" cy="17.5" r="5" fill="#1565C0"/>\n    <text x="55" y="22" font-family="Arial, sans-serif" font-size="12" fill="#333">Naive RAG: similarity decay per hop</text>\n  </g>\n</svg>